<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarihi Belgeler Arşivi | HUMS 131</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      height: auto !important;
      min-height: 100vh !important;
      overflow: auto !important;
      overflow-y: auto !important;
    }

    body {
      background: var(--bg-surface);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    .header-bar {
      padding: 0.8rem 1.5rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.9rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-weight: 700;
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-back:hover {
      background: var(--theme-accent);
      color: #ffffff;
      border-color: var(--theme-accent);
    }

    .main-grid {
      flex: 1;
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 2rem;
      box-sizing: border-box;
      align-items: start;
    }

    @media (max-width: 850px) {
      .main-grid {
        grid-template-columns: 1fr;
        padding: 1rem;
      }
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      position: sticky;
      top: 4.5rem;
    }

    .search-box {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 0.85rem;
      box-sizing: border-box;
    }

    .filter-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .pill-btn {
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .pill-btn.active {
      background: var(--theme-accent);
      color: #ffffff;
      border-color: var(--theme-accent);
    }

    .doc-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: calc(100vh - 220px);
      overflow-y: auto;
      padding-right: 4px;
    }

    .doc-card {
      padding: 0.8rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .doc-card:hover {
      border-color: var(--theme-accent);
    }

    .doc-card.active {
      border-color: var(--theme-accent);
      background: var(--bg-surface);
    }

    .doc-card .badge {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--theme-accent);
    }

    .doc-card .title {
      font-weight: 700;
      font-size: 0.88rem;
      margin: 0;
      color: var(--text-primary);
      line-height: 1.35;
    }

    .doc-card .author {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    /* Direct Page Reader Canvas - No Scroll Boxes */
    .reader-canvas {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .doc-meta-header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }

    .doc-meta-header .badge-tag {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--theme-accent);
      margin-bottom: 0.3rem;
      display: block;
    }

    .doc-meta-header h2 {
      margin: 0.2rem 0 0.4rem 0;
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.25;
    }

    .doc-meta-header .author-info {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .doc-prose {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-primary);
    }

    .doc-prose p {
      margin: 0 0 1rem 0;
    }
  </style>
</head>
<body>

  <!-- Top Navigation Header -->
  <header class="header-bar">
    <div style="display: flex; align-items: center; gap: 1rem;">
      <a href="index.html" class="btn-back" id="btn-back">
        ← <span id="txt-back">Atlas'a Dön</span>
      </a>
      <h1 style="font-family: 'Outfit', sans-serif; font-size: 1.15rem; font-weight: 800; margin: 0; color: var(--text-primary);">HUMS 131: Tarihi Belgeler Arşivi</h1>
    </div>

    <!-- Language Selector -->
    <div class="lang-toggle" onclick="toggleDocLanguage()">
      <button id="doc-lang-btn-tr" class="lang-btn active">TR</button>
      <button id="doc-lang-btn-en" class="lang-btn">EN</button>
    </div>
  </header>

  <!-- Main Layout Grid -->
  <main class="main-grid">
    
    <!-- Sidebar: Search, Filters & List -->
    <aside class="sidebar">
      <input type="text" id="doc-search-input" class="search-box" placeholder="Belgelerde Ara..." oninput="onSearchInput(this.value)">

      <div class="filter-pills" id="filter-pills-container">
        <!-- Filter buttons rendered by JS -->
      </div>

      <div class="doc-list" id="doc-list-container">
        <!-- Cards rendered by JS -->
      </div>
    </aside>

    <!-- Direct Reader Canvas (Flows directly on page) -->
    <article class="reader-canvas" id="doc-reader-canvas">
      <!-- Document text flows directly here -->
    </article>

  </main>

  <script src="data.js"></script>
  <script src="documents.js"></script>
</body>
</html>
