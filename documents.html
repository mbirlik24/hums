<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📜 Birincil Tarihsel Kaynaklar Arşivi | HUMS 131</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Standalone Documents Page Specific Layout */
    .docs-page-body {
      min-height: 100vh;
      background: var(--bg-surface);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
    }

    .docs-header {
      padding: 0.85rem 1.5rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .docs-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.9rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-weight: 700;
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .docs-back-btn:hover {
      background: var(--theme-accent);
      color: #ffffff;
      border-color: var(--theme-accent);
    }

    .docs-hero {
      padding: 2rem 1.5rem 1.5rem 1.5rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      text-align: center;
    }

    .docs-hero h1 {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-primary);
    }

    .docs-hero p {
      margin: 0.5rem 0 0 0;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .docs-main-container {
      flex: 1;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 900px) {
      .docs-main-container {
        grid-template-columns: 1fr;
      }
    }

    .docs-sidebar {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .docs-filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }

    .docs-filter-btn {
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .docs-filter-btn.active {
      background: var(--theme-accent);
      color: #ffffff;
      border-color: var(--theme-accent);
    }

    .docs-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: calc(100vh - 250px);
      overflow-y: auto;
      padding-right: 4px;
    }

    .doc-card-item {
      padding: 0.9rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .doc-card-item:hover {
      border-color: var(--theme-accent);
      transform: translateX(3px);
    }

    .doc-card-item.active {
      border-color: var(--theme-accent);
      background: var(--bg-surface);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.12);
    }

    .doc-card-item .item-badge {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--theme-accent);
    }

    .doc-card-item .item-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin: 0;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .doc-card-item .item-author {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .docs-reader-view {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    .reader-header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .reader-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.65rem;
      border-radius: 6px;
      background: rgba(16, 185, 129, 0.1);
      color: var(--theme-accent);
      font-size: 0.8rem;
      font-weight: 700;
      width: fit-content;
    }

    .reader-title {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
    }

    .reader-author {
      font-size: 0.9rem;
      color: var(--theme-accent);
      font-weight: 600;
    }

    .reader-summary {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.6;
      background: var(--bg-surface);
      padding: 0.85rem 1.1rem;
      border-radius: 8px;
      border-left: 3px solid var(--theme-accent);
    }

    .reader-quote-box {
      background: var(--bg-surface);
      border-left: 4px solid var(--theme-accent);
      padding: 1.1rem 1.35rem;
      border-radius: 0 10px 10px 0;
      font-style: italic;
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--text-primary);
    }

    .reader-text-container {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 1.5rem;
      white-space: pre-wrap;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--text-primary);
      max-height: 600px;
      overflow-y: auto;
    }
  </style>
</head>
<body class="docs-page-body">

  <!-- Header Section -->
  <header class="docs-header">
    <div style="display: flex; align-items: center; gap: 1rem;">
      <a href="index.html" class="docs-back-btn" id="docs-btn-back">
        ← <span id="back-txt">Atlas'a Dön</span>
      </a>
      <h1 style="font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 800; margin: 0; color: var(--text-primary);">HUMS 131</h1>
    </div>

    <!-- Language Selector -->
    <div class="lang-toggle" onclick="toggleDocLanguage()">
      <button id="doc-lang-btn-tr" class="lang-btn active">TR</button>
      <button id="doc-lang-btn-en" class="lang-btn">EN</button>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="docs-hero">
    <h1 id="docs-hero-title">📜 Birincil Tarihsel Kaynaklar Arşivi</h1>
    <p id="docs-hero-subtitle">1492–1867 Dönemine Ait Orijinal Tarihi Belgeler, Bildirgeler, Mektuplar ve Anayasalar</p>
  </section>

  <!-- Main Content Layout -->
  <main class="docs-main-container">
    
    <!-- Sidebar: Filters & Document List -->
    <aside class="docs-sidebar">
      <div style="font-weight: 700; font-size: 0.85rem; color: var(--text-primary);" id="lbl-filter-week">Modül Filtresi:</div>
      <div class="docs-filter-bar" id="docs-filter-bar">
        <button class="docs-filter-btn active" onclick="filterDocs('all')">Tümü</button>
        <button class="docs-filter-btn" onclick="filterDocs(2)">Hafta 2</button>
        <button class="docs-filter-btn" onclick="filterDocs(3)">Hafta 3</button>
        <button class="docs-filter-btn" onclick="filterDocs(4)">Hafta 4</button>
        <button class="docs-filter-btn" onclick="filterDocs(5)">Hafta 5</button>
        <button class="docs-filter-btn" onclick="filterDocs(6)">Hafta 6</button>
      </div>

      <div class="docs-list" id="docs-list-container">
        <!-- List items populated dynamically by JS -->
      </div>
    </aside>

    <!-- Main Reader View -->
    <section class="docs-reader-view" id="docs-reader-container">
      <!-- Active document rendered dynamically by JS -->
    </section>

  </main>

  <script src="data.js"></script>
  <script src="documents.js"></script>
</body>
</html>
