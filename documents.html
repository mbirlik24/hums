<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarihi Belgeler Arşivi | HUMS 131</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100vh;
      background: var(--bg-surface);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    .header-bar {
      padding: 0.8rem 1.5rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.9rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-weight: 700;
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-back:hover {
      background: var(--theme-accent);
      color: #ffffff;
      border-color: var(--theme-accent);
    }

    .main-grid {
      flex: 1;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 1.5rem;
      box-sizing: border-box;
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
        padding: 1rem;
      }
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .search-box {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 0.85rem;
      box-sizing: border-box;
    }

    .filter-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .pill-btn {
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .pill-btn.active {
      background: var(--theme-accent);
      color: #ffffff;
      border-color: var(--theme-accent);
    }

    .doc-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
      padding-right: 4px;
    }

    .doc-card {
      padding: 0.85rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .doc-card:hover {
      border-color: var(--theme-accent);
      transform: translateX(2px);
    }

    .doc-card.active {
      border-color: var(--theme-accent);
      background: var(--bg-surface);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1);
    }

    .doc-card .badge {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--theme-accent);
    }

    .doc-card .title {
      font-weight: 700;
      font-size: 0.88rem;
      margin: 0;
      color: var(--text-primary);
      line-height: 1.35;
    }

    .doc-card .author {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .reader-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
    }

    .doc-header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }

    .doc-header .tag {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      background: rgba(16, 185, 129, 0.1);
      color: var(--theme-accent);
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .doc-header h2 {
      margin: 0.2rem 0 0.4rem 0;
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-primary);
    }

    .doc-header .author-line {
      font-size: 0.88rem;
      color: var(--theme-accent);
      font-weight: 600;
    }

    .section-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }

    .quote-callout {
      border-left: 4px solid var(--theme-accent);
      background: var(--bg-surface);
      padding: 1rem 1.25rem;
      border-radius: 0 8px 8px 0;
      font-style: italic;
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--text-primary);
    }

    .prose-container {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 1.5rem;
      max-height: 650px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <!-- Top Navigation Header -->
  <header class="header-bar">
    <div style="display: flex; align-items: center; gap: 1rem;">
      <a href="index.html" class="btn-back" id="btn-back">
        ← <span id="txt-back">Atlas'a Dön</span>
      </a>
      <h1 style="font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 800; margin: 0; color: var(--text-primary);">HUMS 131: Tarihi Belgeler Arşivi</h1>
    </div>

    <!-- Language Selector -->
    <div class="lang-toggle" onclick="toggleDocLanguage()">
      <button id="doc-lang-btn-tr" class="lang-btn active">TR</button>
      <button id="doc-lang-btn-en" class="lang-btn">EN</button>
    </div>
  </header>

  <!-- Main Layout Grid -->
  <main class="main-grid">
    
    <!-- Sidebar: Search, Filters & List -->
    <aside class="sidebar">
      <input type="text" id="doc-search-input" class="search-box" placeholder="Belgelerde Ara..." oninput="onSearchInput(this.value)">

      <div class="filter-pills" id="filter-pills-container">
        <!-- Filter buttons rendered by JS -->
      </div>

      <div class="doc-list" id="doc-list-container">
        <!-- Cards rendered by JS -->
      </div>
    </aside>

    <!-- Main Reader View -->
    <section class="reader-panel" id="doc-reader-panel">
      <!-- Active document prose rendered by JS -->
    </section>

  </main>

  <script src="data.js"></script>
  <script src="documents.js"></script>
</body>
</html>
