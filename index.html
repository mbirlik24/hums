<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarih Atlası: Kolomb Değişimi ve Devrimler Çağı</title>
  <!-- Leaflet CSS from CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header Section -->
  <header>
    <div class="logo-container" style="display: flex; align-items: center; gap: 0.75rem;">
      <h1 id="header-app-title" style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--text-primary); margin: 0; padding: 0;">HUMS 131</h1>
      <button class="quiz-submit-btn" style="background: var(--bg-surface); border: 1px solid var(--theme-accent); color: var(--theme-accent); font-size: 0.72rem; font-weight: 700; display: flex; align-items: center; gap: 0.35rem; padding: 0.35rem 0.6rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; margin-top: 0; white-space: nowrap;" onclick="downloadStudyGuidePDF()" id="pdf-download-btn">
        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span id="pdf-btn-text">Ders Notunu İndir</span>
      </button>
    </div>
    
    <div class="header-controls">
      <!-- Module Selector Dropdown -->
      <div class="module-selector-container">
        <label for="module-select" id="lbl-module-select">Modül Seçin:</label>
        <select id="module-select" onchange="switchWeek(parseInt(this.value))">
          <option value="2" id="opt-week-2">2. Hafta: Kolomb Değişimi</option>
          <option value="3" id="opt-week-3">3. Hafta: Transatlantik Köle Ticareti</option>
          <option value="4" id="opt-week-4">4. Hafta: Amerika Devrimi</option>
          <option value="5" id="opt-week-5">5. Hafta: Fransız Devrimi</option>
          <option value="6" id="opt-week-6">6. Hafta: Haiti Devrimi</option>
        </select>
      </div>

      <!-- Language Selector -->
      <div class="lang-toggle" onclick="toggleLanguage()">
        <button id="lang-btn-tr" class="lang-btn active">TR</button>
        <button id="lang-btn-en" class="lang-btn">EN</button>
      </div>
      
      <!-- Global Progress Bar -->
      <div class="progress-container">
        <div class="progress-label">
          <span id="progress-lbl-text">Genel İlerleme</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Grid Layout -->
  <div class="app-container">

    <!-- Workspace Dashboard and Map Viewport -->
    <main class="main-content">
      
      <!-- Left Dashboard Panel -->
      <section class="workspace-panel">
        
        <!-- Active Week/Module Title Header -->
        <div class="active-module-header">
          <div class="active-module-eyebrow" id="active-module-eyebrow">MODÜL</div>
          <h2 class="active-module-title" id="active-module-title-text">Yükleniyor...</h2>
        </div>
        
        <!-- Tab Navigation Bar -->
        <nav class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('narrative')" id="tab-btn-narrative">
            <svg class="tab-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            <span id="tab-txt-narrative">Anlatım</span>
          </button>
          <button class="tab-btn" onclick="switchTab('map-explorer')" id="tab-btn-explorer">
            <svg class="tab-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
            <span id="tab-txt-explorer">Harita</span>
          </button>
          <button class="tab-btn" onclick="switchTab('graphics')" id="tab-btn-graphics">
            <svg class="tab-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
            <span id="tab-txt-graphics">Grafik</span>
          </button>
          <button class="tab-btn" onclick="switchTab('quiz')" id="tab-btn-quiz">
            <svg class="tab-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
            <span id="tab-txt-quiz">Test</span>
          </button>
        </nav>
        
        <!-- Tab Content Cards -->
        
        <!-- Tab 1: Narrative Journey -->
        <div class="dashboard-card fade-in" id="card-narrative">
          <h2 class="card-title" id="narrative-title">Anlatım Başlığı</h2>
          <div class="slide-content" id="narrative-text">
            Slayt içeriği yükleniyor...
          </div>
          <div class="slide-actions" style="margin-top: auto;">
            <button class="slide-nav-btn" onclick="prevSlide()" id="slide-btn-prev" disabled>←</button>
            <span class="slide-counter" id="slide-counter-text">Slayt 1 / 8</span>
            <button class="slide-nav-btn" onclick="nextSlide()" id="slide-btn-next">→</button>
          </div>
        </div>
        
         <!-- Tab 2: Map Explorer Layer Selection -->
          <div class="dashboard-card fade-in" id="card-map-explorer" style="display: none; gap: 0.75rem;">
            <h2 class="card-title" id="explorer-title">Harita Kaşifi</h2>
            
            <div style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding-right: 4px;">
              <div class="explorer-section">
                <h4 class="explorer-section-title" id="explorer-lbl-routes">Yollar ve Akışlar</h4>
                <div class="map-filters" id="explorer-filter-list">
                  <!-- Dynamically populated -->
                </div>
              </div>
              
              <div class="explorer-section" style="border-top: 1px solid var(--border-color); padding-top: 1rem;">
                <h4 class="explorer-section-title" id="explorer-lbl-locations">Tarihi Konumlar ve Limanlar</h4>
                <input type="text" id="location-search" oninput="searchLocations(this.value)" placeholder="Konum ara..." class="location-search-input">
                <div class="location-grid" id="explorer-location-list">
                  <!-- Dynamically populated location nodes -->
                </div>
              </div>
            </div>
          </div>
        
        <!-- Tab 3: Interactive Graphics -->
        <div class="dashboard-card fade-in" id="card-graphics" style="display: none;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
            <h2 class="card-title" id="graphics-title" style="margin: 0;">Görsel Şemalar</h2>
            <div style="display: flex; gap: 0.35rem; align-items: center;">
              <button class="slide-nav-btn" onclick="adjustDiagramZoom(0.1)" title="Yakınlaştır / Zoom In" style="width:28px; height:28px; font-weight:bold; font-size:1rem; padding:0; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer;">+</button>
              <button class="slide-nav-btn" onclick="adjustDiagramZoom(-0.1)" title="Uzaklaştır / Zoom Out" style="width:28px; height:28px; font-weight:bold; font-size:1rem; padding:0; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer;">−</button>
              <button class="slide-nav-btn" onclick="resetDiagramZoom()" title="Sıfırla / Reset" style="width:34px; height:28px; font-size:0.7rem; padding:0; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer; font-weight:bold;">100%</button>
              <button class="slide-nav-btn" onclick="toggleDiagramFullscreen()" title="Büyüt / Fullscreen" style="width:28px; height:28px; font-size:0.85rem; padding:0; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer;" id="diagram-fs-btn">⛶</button>
            </div>
          </div>
          <div class="infographic-container" id="graphics-diagram-box">
            <!-- Dynamic SVG builder output -->
          </div>
        </div>
        
        <!-- Tab 4: Weekly Knowledge Test -->
        <div class="dashboard-card fade-in" id="card-quiz" style="display: none;">
          <h2 class="card-title" id="quiz-card-title">Modül Değerlendirmesi</h2>
          <div id="quiz-container">
            <!-- Quiz output -->
          </div>
        </div>
        
      </section>

      <!-- Panel Resizer Divider -->
      <div class="resizer" id="drag-resizer"></div>

      <!-- Right Interactive Map Panel -->
      <section class="map-panel">
        
        <!-- Fullscreen toggle control button -->
        <button class="map-ctrl-btn" id="map-fullscreen-btn" onclick="toggleMapFullscreen()" title="Tam Ekran / Fullscreen">⛶</button>
        
        <!-- Interactive Leaflet Map Canvas (CartoDB Positron Basemap) -->
        <div id="map-canvas" style="height: 100%; width: 100%; z-index: 1;"></div>
        
        <!-- Compact Legend & Info Panel -->
        <div class="map-overlay" style="z-index: 1000; padding: 0.4rem 0.6rem; border-radius: 8px; display: flex; align-items: center; gap: 0.6rem; width: auto; max-width: 320px;">
          <span id="map-active-week" style="font-size: 0.7rem; font-weight: 700; background: var(--theme-accent); color: #fff; padding: 3px 7px; border-radius: 4px; white-space: nowrap;">2. Hafta</span>
          <label style="display: flex; align-items: center; gap: 0.35rem; font-family: var(--font-display); font-size: 0.72rem; font-weight: 700; color: var(--text-primary); cursor: pointer; user-select: none; white-space: nowrap; margin: 0;">
            <input type="checkbox" id="chk-toggle-labels" onchange="toggleMapLabelsMode()" style="cursor: pointer; width: 13px; height: 13px; margin: 0;">
            <span id="lbl-toggle-labels-text">Hepsini Göster</span>
          </label>
        </div>
        
      </section>
      
    </div>
  </div>

  <!-- Information Modal Popup -->
  <div class="modal-overlay" id="modal-container" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title-text">Liman Bilgisi</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body-text">
        Detaylı bilgi yükleniyor...
      </div>
    </div>
  </div>

  <!-- Leaflet JS from CDN -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
